version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: industrix-db
    environment:
      POSTGRES_DB: industrix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: industrix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
